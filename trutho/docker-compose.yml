version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: trutho
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: truthopassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:truthopassword@db:5432/trutho
      SECRET_KEY: change-this-to-64-random-chars-before-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      UPLOAD_DIR: uploads
      MAX_UPLOAD_SIZE_MB: 50
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db

volumes:
  pgdata:
